<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petualangan Abjad Boni si Beruang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFDE59; /* Kuning Menarik */
            overflow-x: hidden;
            user-select: none;
        }
        .font-kids { font-family: 'Fredoka One', cursive; }
        
        .bear-character {
            transition: transform 0.3s ease;
        }
        .bear-character:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .card-bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .letter-slot {
            min-width: 60px;
            min-height: 80px;
            border: 3px dashed #B45309;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-family: 'Fredoka One';
        }

        .draggable-letter {
            cursor: grab;
            transition: all 0.2s;
        }
        .draggable-letter:active {
            cursor: grabbing;
            transform: scale(1.2);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            border-radius: 50%;
            animation: fall 3s linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header Section -->
    <header class="text-center mt-6 mb-8 w-full max-w-2xl bg-white rounded-3xl p-6 shadow-xl border-b-8 border-yellow-600">
        <h1 class="text-4xl md:text-5xl text-orange-600 font-kids mb-2">Petualangan Boni</h1>
        <p class="text-gray-700 font-bold">Ayo belajar membaca dan menyusun kata!</p>
    </header>

    <!-- Main Game Container -->
    <main id="game-container" class="w-full max-w-4xl bg-white/80 backdrop-blur-sm rounded-[3rem] p-8 shadow-2xl relative min-h-[500px]">
        
        <!-- Boni the Bear SVG -->
        <div id="boni-container" class="absolute -top-16 -right-10 md:-right-16 w-32 md:w-48 bear-character z-10">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="80" fill="#8B4513" />
                <circle cx="60" cy="40" r="25" fill="#8B4513" />
                <circle cx="140" cy="40" r="25" fill="#8B4513" />
                <circle cx="100" cy="110" r="60" fill="#D2B48C" />
                <circle cx="80" cy="80" r="8" fill="black" />
                <circle cx="120" cy="80" r="8" fill="black" />
                <ellipse cx="100" cy="110" rx="15" ry="10" fill="black" />
                <path d="M 85 130 Q 100 145 115 130" stroke="black" stroke-width="3" fill="none" />
            </svg>
        </div>

        <!-- Navigation Buttons -->
        <div id="main-menu" class="flex flex-col gap-4 items-center justify-center h-full space-y-4">
            <button onclick="startMode('alphabet')" class="group relative bg-orange-500 hover:bg-orange-600 text-white font-kids text-2xl py-6 px-12 rounded-2xl shadow-lg transition-all hover:scale-105 active:scale-95 w-full max-w-sm overflow-hidden">
                <span class="relative z-10">?? BELAJAR HURUF</span>
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </button>
            <button onclick="startMode('words')" class="group relative bg-blue-500 hover:bg-blue-600 text-white font-kids text-2xl py-6 px-12 rounded-2xl shadow-lg transition-all hover:scale-105 active:scale-95 w-full max-w-sm overflow-hidden">
                <span class="relative z-10">?? SUSUN KATA</span>
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </button>
        </div>

        <!-- Game Views -->
        <div id="alphabet-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showMenu()" class="text-orange-600 font-bold flex items-center gap-2">? Kembali</button>
                <h2 class="font-kids text-2xl text-brown-800">Kenali Hurufnya!</h2>
                <div class="w-10"></div>
            </div>
            <div id="alphabet-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-7 gap-3">
                <!-- Dynamically filled -->
            </div>
        </div>

        <div id="word-view" class="hidden text-center">
            <div class="flex justify-between items-center mb-6 text-left">
                <button onclick="showMenu()" class="text-blue-600 font-bold flex items-center gap-2">? Kembali</button>
                <div id="score-display" class="font-kids text-xl bg-yellow-400 px-4 py-1 rounded-full">Skor: 0</div>
            </div>
            
            <div id="word-image" class="text-7xl mb-8 card-bounce">??</div>
            
            <div id="slots-container" class="flex flex-wrap justify-center gap-4 mb-10">
                <!-- Word slots will go here -->
            </div>

            <div id="letters-pool" class="flex flex-wrap justify-center gap-3 mt-8">
                <!-- Mixed letters to drag/click -->
            </div>
        </div>

    </main>

    <!-- Feedback Message Box -->
    <div id="feedback-box" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 hidden z-50 pointer-events-none">
        <div class="bg-white border-8 border-green-500 rounded-full px-12 py-6 shadow-2xl scale-0 transition-transform duration-300" id="feedback-content">
            <span class="text-4xl font-kids text-green-600" id="feedback-text">HEBAT! ??</span>
        </div>
    </div>

    <script>
        // Efek Suara menggunakan Audio Context atau file publik yang aman
        const sounds = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/2603/2603-preview.mp3'),
            cheer: new Audio('https://assets.mixkit.co/active_storage/sfx/512/512-preview.mp3')
        };

        function playSound(name) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(e => console.log("Audio play blocked by browser. Click anywhere to enable."));
        }

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const wordsData = [
            { word: "APEL", icon: "??" },
            { word: "BOLA", icon: "?" },
            { word: "BUKU", icon: "??" },
            { word: "IKAN", icon: "??" },
            { word: "AYAM", icon: "??" },
            { word: "SAPI", icon: "??" },
            { word: "RUSA", icon: "??" },
            { word: "MEJA", icon: "??" }
        ];

        let currentWordIndex = 0;
        let score = 0;
        let currentProgress = [];

        function showMenu() {
            playSound('click');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('alphabet-view').classList.add('hidden');
            document.getElementById('word-view').classList.add('hidden');
        }

        function startMode(mode) {
            playSound('click');
            document.getElementById('main-menu').classList.add('hidden');
            if (mode === 'alphabet') {
                renderAlphabet();
                document.getElementById('alphabet-view').classList.remove('hidden');
            } else {
                currentWordIndex = 0;
                score = 0;
                updateScore();
                loadWordChallenge();
                document.getElementById('word-view').classList.remove('hidden');
            }
        }

        // --- ALPHABET MODE ---
        function renderAlphabet() {
            const grid = document.getElementById('alphabet-grid');
            grid.innerHTML = '';
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-4 border-yellow-400 hover:bg-yellow-100 p-4 rounded-xl font-kids text-3xl shadow-md transition-all active:scale-90 hover:scale-105";
                btn.innerHTML = `<span class="text-orange-600">${letter}</span><br><span class="text-gray-400 text-sm font-sans">${letter.toLowerCase()}</span>`;
                btn.onclick = () => speakLetter(letter);
                grid.appendChild(btn);
            });
        }

        function speakLetter(letter) {
            playSound('pop');
            showFeedback(`Itu huruf ${letter}!`, "blue");
            
            // Menggunakan sintesis suara browser untuk menyebutkan huruf
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(letter);
                utterance.lang = 'id-ID';
                utterance.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- WORD CHALLENGE MODE ---
        function loadWordChallenge() {
            const wordObj = wordsData[currentWordIndex];
            const targetWord = wordObj.word;
            currentProgress = new Array(targetWord.length).fill(null);
            
            document.getElementById('word-image').innerText = wordObj.icon;
            
            const slotsContainer = document.getElementById('slots-container');
            slotsContainer.innerHTML = '';
            for (let i = 0; i < targetWord.length; i++) {
                const slot = document.createElement('div');
                slot.className = "letter-slot shadow-inner";
                slot.id = `slot-${i}`;
                slotsContainer.appendChild(slot);
            }

            const lettersPool = document.getElementById('letters-pool');
            lettersPool.innerHTML = '';
            let pool = targetWord.split("");
            pool.push(alphabet[Math.floor(Math.random() * 26)]);
            pool = pool.sort(() => Math.random() - 0.5);

            pool.forEach((letter, index) => {
                const char = document.createElement('button');
                char.className = "draggable-letter bg-white border-4 border-blue-400 text-blue-600 font-kids text-3xl p-4 rounded-2xl shadow-lg hover:bg-blue-50 active:scale-110";
                char.innerText = letter;
                char.onclick = () => tryPlaceLetter(letter, char);
                lettersPool.appendChild(char);
            });
        }

        function tryPlaceLetter(letter, element) {
            const wordObj = wordsData[currentWordIndex];
            const targetWord = wordObj.word;
            
            let placed = false;
            for (let i = 0; i < targetWord.length; i++) {
                if (targetWord[i] === letter && currentProgress[i] === null) {
                    currentProgress[i] = letter;
                    const slot = document.getElementById(`slot-${i}`);
                    slot.innerText = letter;
                    slot.style.borderStyle = "solid";
                    slot.style.borderColor = "#10B981"; // green
                    slot.classList.add('bg-green-100');
                    
                    element.style.opacity = "0.5";
                    element.disabled = true;
                    element.classList.add('scale-75');
                    
                    playSound('pop');
                    placed = true;
                    break;
                }
            }

            if (!placed) {
                playSound('wrong');
                element.classList.add('animate-bounce');
                setTimeout(() => element.classList.remove('animate-bounce'), 500);
            }

            checkWin();
        }

        function checkWin() {
            const targetWord = wordsData[currentWordIndex].word;
            if (currentProgress.join('') === targetWord) {
                score += 10;
                updateScore();
                playSound('success');
                setTimeout(() => playSound('cheer'), 300);
                
                showFeedback("Luar Biasa! ?", "green");
                createConfetti();
                
                setTimeout(() => {
                    currentWordIndex = (currentWordIndex + 1) % wordsData.length;
                    loadWordChallenge();
                }, 2000);
            }
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `Skor: ${score}`;
        }

        function showFeedback(text, colorClass) {
            const box = document.getElementById('feedback-box');
            const content = document.getElementById('feedback-content');
            const txt = document.getElementById('feedback-text');
            
            txt.innerText = text;
            txt.className = `text-4xl font-kids text-${colorClass}-600`;
            content.className = `bg-white border-8 border-${colorClass}-500 rounded-full px-12 py-6 shadow-2xl transition-transform duration-300 scale-100`;
            
            box.classList.remove('hidden');
            
            setTimeout(() => {
                content.classList.remove('scale-100');
                content.classList.add('scale-0');
                setTimeout(() => box.classList.add('hidden'), 300);
            }, 1500);
        }

        function createConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 4000);
            }
        }

        window.onload = () => {
            console.log("Aplikasi Boni si Beruang siap dimainkan!");
        };
    </script>
</body>
</html>
